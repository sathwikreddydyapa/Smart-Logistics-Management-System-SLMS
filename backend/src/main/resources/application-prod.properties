# Production Configuration (Render Free Tier - H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:slms_db
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Google Cloud / Google One Secrets
slms.google.credentials.path=/etc/secrets/gcp-key.json
slms.drive.folder.id=1OI-mfOF2ul00LUDHNwdgt3yyMF66udwH

# JWT Configuration
slms.app.jwtSecret=SuperSecretKeyForSLMSLogisticsManagementSystemThatMustBeLongEnough123!
slms.app.jwtExpirationMs=86400000

# Server Port (Render uses 8080 by default)
server.port=8080
