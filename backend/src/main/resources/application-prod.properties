# Production Configuration (Render Free Tier - H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:slms_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (Disabled in Prod for Security)
spring.h2.console.enabled=false

# JWT Configuration
slms.app.jwtSecret=SuperSecretKeyForSLMSLogisticsManagementSystemThatMustBeLongEnough123!
slms.app.jwtExpirationMs=86400000

# Server Port (Render uses 8080 by default)
server.port=8080
