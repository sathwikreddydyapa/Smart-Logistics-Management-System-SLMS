services:
  # ⚙️ Java Spring Boot Backend (Docker)
  - type: web
    name: slms-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/shipments/all
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # 🚀 React Frontend (Static)
  - type: web
    name: slms-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://slms-backend.onrender.com
